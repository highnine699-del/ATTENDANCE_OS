name = "attendance-os-scrape-proxy"
main = "scrape-proxy.js"
compatibility_date = "2024-01-01"

# KV namespace for rate limiting (optional - if not configured, rate limiting is disabled)
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "your-kv-namespace-id"

# Environment variables (none needed - credentials are per-request)
# [vars]
# WORKER_URL = "https://attendance-os-scrape-proxy.YOUR_SUBDOMAIN.workers.dev"
