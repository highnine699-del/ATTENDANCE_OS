<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
        content="Track your LMU attendance, calculate safe skips, and monitor your semester progress with Attendance OS.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attendance OS — LMU</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loading-text">
            <div class="spinner loading-spinner"></div>
            <p>Loading Attendance OS...</p>
        </div>
    </div>
    <div id="app">
        <aside id="sidebar">
            <header>
                <h1><span class="icon-chart"></span> Attendance OS</h1>
                <p class="subtitle">LMU Landmark University</p>
                <p class="user-display" id="user-display"></p>
            </header>
            <nav id="nav-menu">
                <button class="nav-item active" data-module="dashboard">Dashboard</button>
                <button class="nav-item" data-module="courses">My Courses</button>
                <button class="nav-item" data-module="calculator">Calculator</button>
                <button class="nav-item" data-module="analytics">Analytics</button>
                <button class="nav-item" data-module="sync">Sync Data</button>
                <button class="nav-item" data-module="settings">Settings</button>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
                    <span class="icon-moon"></span>
                </button>
                <button id="install-extension-btn" class="install-extension-btn"
                    title="Install the Chrome extension for auto-sync">
                    📦 Install Extension
                </button>
            </div>
            <div id="sync-status" class="sync-status">
                <div id="sync-source-badge" class="sync-source-badge"></div>
                <p id="last-sync">Last sync: never</p>
                <button id="quick-sync" class="btn-secondary">Quick Sync</button>
            </div>
        </aside>
        <main id="content">
            <!-- Modules render here -->
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
